<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🟢 Green Light — Agente Conversacional</title>
<style>
/* ── Reset & Base ─────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: #0f1117;
  color: #e8e8e8;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ── Top Bar ──────────────────────────────────────────────────────────── */
#topbar {
  background: #1a1d27;
  border-bottom: 2px solid #f5a62322;
  padding: 10px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  z-index: 10;
  box-shadow: 0 2px 16px rgba(0,0,0,0.4);
}
.logo {
  font-size: 18px;
  font-weight: 700;
  color: #f5a623;
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo .logo-icon { font-size: 20px; }
.logo .logo-name { color: #e8e8e8; }
.logo-badge {
  font-size: 9px;
  background: #f5a62322;
  color: #f5a623;
  border: 1px solid #f5a62344;
  padding: 2px 8px;
  border-radius: 20px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
}
#user-fields {
  display: flex;
  gap: 8px;
  align-items: center;
}
#user-fields input {
  background: #0f1117;
  border: 1px solid #2a2d3a;
  color: #e8e8e8;
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 13px;
  width: 150px;
  transition: border-color 0.2s, box-shadow 0.2s;
  font-family: inherit;
}
#user-fields input:focus {
  outline: none;
  border-color: #f5a623;
  box-shadow: 0 0 0 3px rgba(245,166,35,0.12);
}
#user-fields input::placeholder { color: #444; }

/* ── Progress bar (optional) ──────────────────────────────────────────── */
#progress-bar {
  height: 2px;
  background: #1a1d27;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
#progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #f5a623, #ffd280);
  width: 0%;
  transition: width 0.5s ease;
}

/* ── Chat Area ────────────────────────────────────────────────────────── */
#chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 28px 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  scroll-behavior: smooth;
}
#chat-area::-webkit-scrollbar { width: 5px; }
#chat-area::-webkit-scrollbar-track { background: transparent; }
#chat-area::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 3px; }
#chat-area::-webkit-scrollbar-thumb:hover { background: #3a3d4a; }

/* ── Center wrapper for wider screens ─────────────────────────────────── */
.chat-wrapper {
  max-width: 860px;
  width: 100%;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ── Messages ─────────────────────────────────────────────────────────── */
.msg {
  display: flex;
  gap: 10px;
  animation: fadeInUp 0.22s ease-out;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.msg.agent { align-self: flex-start; max-width: 84%; }
.msg.user  { align-self: flex-end; flex-direction: row-reverse; max-width: 76%; }

.avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: linear-gradient(135deg, #f5a623, #e8920a);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
  margin-top: 2px;
  box-shadow: 0 2px 8px rgba(245,166,35,0.3);
}
.msg.user .avatar {
  background: linear-gradient(135deg, #305bab, #1e3d7a);
  box-shadow: 0 2px 8px rgba(48,91,171,0.3);
}

.bubble {
  background: #1a1d27;
  border-left: 3px solid #f5a623;
  padding: 12px 16px;
  border-radius: 0 14px 14px 14px;
  font-size: 14px;
  line-height: 1.7;
  word-wrap: break-word;
  position: relative;
}
.msg.user .bubble {
  background: #305bab;
  border-left: none;
  border-right: 3px solid #4a7bcb;
  border-radius: 14px 0 14px 14px;
  color: #e8f0ff;
}

/* ── Choice Buttons ───────────────────────────────────────────────────── */
.buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
}
.btn-choice {
  background: transparent;
  border: 1.5px solid #f5a623;
  color: #f5a623;
  padding: 7px 16px;
  border-radius: 22px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.18s ease;
  white-space: nowrap;
  font-family: inherit;
  letter-spacing: 0.2px;
}
.btn-choice:hover:not(:disabled) {
  background: #f5a623;
  color: #0f1117;
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(245,166,35,0.35);
}
.btn-choice:active:not(:disabled) { transform: translateY(0); }
.btn-choice:disabled {
  opacity: 0.38;
  cursor: not-allowed;
  transform: none;
}
.btn-choice.selected {
  background: #f5a623;
  color: #0f1117;
  font-weight: 600;
  opacity: 1 !important;
}
.btn-choice.btn-primary {
  background: #f5a623;
  color: #0f1117;
  font-weight: 600;
  border-color: #f5a623;
}
.btn-choice.btn-primary:hover:not(:disabled) {
  background: #ffd280;
  border-color: #ffd280;
}
.btn-choice.btn-secondary {
  border-color: #555;
  color: #aaa;
}
.btn-choice.btn-secondary:hover:not(:disabled) {
  background: #555;
  color: #e8e8e8;
  box-shadow: none;
}

/* ── Multi-select Chips ───────────────────────────────────────────────── */
.chips-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}
.chip {
  border: 1px solid #444;
  background: #1a1d27;
  color: #e8e8e8;
  border-radius: 20px;
  padding: 6px 14px;
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  transition: all 0.18s ease;
  user-select: none;
}
.chip:hover:not(.disabled) {
  border-color: #f5a623;
  color: #f5a623;
}
.chip.active {
  border-color: #f5a623;
  background: rgba(245,166,35,0.15);
  color: #f5a623;
  font-weight: 600;
}
.chip.disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.confirm-area {
  margin-top: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.chip-confirm-btn {
  background: #f5a623;
  color: #0f1117;
  border: none;
  border-radius: 22px;
  padding: 8px 20px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.18s ease;
}
.chip-confirm-btn:hover:not(:disabled) {
  background: #ffd280;
  transform: translateY(-1px);
}
.chip-confirm-btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
  transform: none;
}
.chip-hint {
  font-size: 12px;
  color: #666;
}

/* ── Typing Indicator ─────────────────────────────────────────────────── */
.typing {
  display: flex;
  gap: 5px;
  align-items: center;
  padding: 11px 15px;
  background: #1a1d27;
  border-left: 3px solid #f5a623;
  border-radius: 0 14px 14px 14px;
  width: fit-content;
}
.dot {
  width: 7px;
  height: 7px;
  background: #f5a623;
  border-radius: 50%;
  animation: bounce 1.2s infinite;
  opacity: 0.8;
}
.dot:nth-child(2) { animation-delay: 0.18s; }
.dot:nth-child(3) { animation-delay: 0.36s; }
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
  30%            { transform: translateY(-7px); opacity: 1; }
}

/* ── Risk Badges ──────────────────────────────────────────────────────── */
.risk-badge {
  padding: 4px 12px;
  border-radius: 22px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  white-space: nowrap;
  display: inline-block;
}
.risk-low      { background: #0ca78922; color: #0ca789; border: 1px solid #0ca78955; }
.risk-medium   { background: #f5a62322; color: #f5a623; border: 1px solid #f5a62355; }
.risk-high     { background: #ff646422; color: #ff6464; border: 1px solid #ff646455; }
.risk-critical {
  background: #cc000033;
  color: #ff4444;
  border: 1px solid #ff000066;
  animation: pulse-badge 1.5s infinite;
}
@keyframes pulse-badge {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,68,68,0.5); }
  50%       { box-shadow: 0 0 0 7px rgba(255,68,68,0); }
}

/* ── Diagnosis Card ───────────────────────────────────────────────────── */
.diagnosis-card {
  background: #0f1117;
  border: 1px solid #2a2d3a;
  border-radius: 14px;
  overflow: hidden;
  margin-top: 6px;
  max-width: 580px;
  box-shadow: 0 6px 32px rgba(0,0,0,0.5);
}
.card-header {
  background: linear-gradient(135deg, #1a1d27 0%, #1f2235 100%);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  border-bottom: 1px solid #2a2d3a;
}
.card-header h3 {
  font-size: 15px;
  font-weight: 700;
  color: #f0f0f0;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.card-section {
  padding: 14px 20px;
  border-top: 1px solid #1e2130;
}
.card-section h4 {
  font-size: 10px;
  text-transform: uppercase;
  color: #555;
  letter-spacing: 1px;
  margin-bottom: 10px;
  font-weight: 700;
}

/* Team items */
.team-item {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  margin-bottom: 9px;
  font-size: 13px;
  line-height: 1.5;
}
.team-item:last-child { margin-bottom: 0; }
.team-badge {
  background: #305bab22;
  color: #7ba7f7;
  border: 1px solid #305bab44;
  padding: 2px 9px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  flex-shrink: 0;
  margin-top: 1px;
  white-space: nowrap;
}
.team-reason { color: #bbb; font-size: 13px; }

/* Authority flags */
.flag-item {
  background: #ff646410;
  border-left: 3px solid #ff6464;
  padding: 9px 12px;
  border-radius: 0 7px 7px 0;
  margin-bottom: 8px;
  font-size: 13px;
  line-height: 1.5;
}
.flag-item:last-child { margin-bottom: 0; }
.flag-label {
  font-size: 10px;
  color: #ff6464;
  font-weight: 700;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.flag-desc { color: #ddd; }
.flag-authority {
  font-size: 11px;
  color: #ff9090;
  margin-top: 5px;
  font-weight: 500;
}

/* Conflicts & synergies */
.conflict-item {
  background: #ff646411;
  border-left: 3px solid #ff6464;
  padding: 8px 12px;
  border-radius: 0 6px 6px 0;
  margin-bottom: 7px;
  font-size: 13px;
  line-height: 1.5;
}
.synergy-item {
  background: #0ca78911;
  border-left: 3px solid #0ca789;
  padding: 8px 12px;
  border-radius: 0 6px 6px 0;
  margin-bottom: 7px;
  font-size: 13px;
  line-height: 1.5;
}

/* Recommendations */
.rec-item {
  display: flex;
  gap: 10px;
  padding: 5px 0;
  font-size: 13px;
  color: #ccc;
  line-height: 1.6;
  align-items: flex-start;
}
.rec-item .rec-arrow { color: #f5a623; flex-shrink: 0; margin-top: 2px; }

/* Empty state */
.empty-state { color: #444; font-size: 13px; font-style: italic; padding: 2px 0; }

/* ── Processing indicator ─────────────────────────────────────────────── */
.processing-wrap {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.processing-msg { color: #bbb; font-size: 14px; line-height: 1.6; }
.processing-dots {
  display: inline-flex;
  gap: 4px;
  margin-left: 6px;
  vertical-align: middle;
}
.processing-dots .pd {
  width: 5px;
  height: 5px;
  background: #f5a623;
  border-radius: 50%;
  animation: proc-b 1.1s infinite;
  display: inline-block;
}
.processing-dots .pd:nth-child(2) { animation-delay: 0.18s; }
.processing-dots .pd:nth-child(3) { animation-delay: 0.36s; }
@keyframes proc-b {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30%            { transform: translateY(-5px); opacity: 1; }
}
.progress-steps { display: flex; flex-direction: column; gap: 5px; margin-top: 4px; }
.progress-step {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: #555;
  animation: fadeInStep 0.4s ease both;
}
@keyframes fadeInStep {
  from { opacity: 0; transform: translateX(-6px); }
  to   { opacity: 1; transform: translateX(0); }
}
.progress-step.active { color: #f5a623; }
.progress-step.done   { color: #0ca789; }
.step-icon { width: 16px; text-align: center; }

/* ── Success banner ───────────────────────────────────────────────────── */
.success-banner {
  background: #0ca78912;
  border: 1px solid #0ca78955;
  border-radius: 12px;
  padding: 18px 20px;
  margin-top: 4px;
  max-width: 460px;
  animation: fadeInUp 0.3s ease;
}
.success-icon { font-size: 30px; margin-bottom: 8px; display: block; }
.success-title { font-size: 15px; font-weight: 600; color: #0ca789; margin-bottom: 2px; }
.success-qcid {
  font-size: 30px;
  font-weight: 800;
  color: #0ca789;
  letter-spacing: 1px;
  margin: 10px 0 6px;
  font-variant-numeric: tabular-nums;
}
.success-detail { font-size: 13px; color: #999; line-height: 1.7; }
.success-detail a { color: #f5a623; text-decoration: none; }
.success-detail a:hover { text-decoration: underline; }

/* ── Input area ───────────────────────────────────────────────────────── */
#input-area {
  background: #1a1d27;
  border-top: 1px solid #2a2d3a;
  padding: 12px 20px;
  display: flex;
  gap: 10px;
  align-items: flex-end;
  flex-shrink: 0;
}
.input-wrap {
  flex: 1;
  max-width: 820px;
  margin: 0 auto;
  display: flex;
  gap: 10px;
  align-items: flex-end;
  width: 100%;
}
#msg-input {
  flex: 1;
  background: #0f1117;
  border: 1.5px solid #2a2d3a;
  color: #e8e8e8;
  padding: 10px 16px;
  border-radius: 12px;
  font-size: 14px;
  resize: none;
  min-height: 44px;
  max-height: 120px;
  overflow-y: auto;
  transition: border-color 0.2s, box-shadow 0.2s;
  font-family: inherit;
  line-height: 1.5;
}
#msg-input:focus {
  outline: none;
  border-color: #f5a623;
  box-shadow: 0 0 0 3px rgba(245,166,35,0.1);
}
#msg-input::placeholder { color: #3a3a3a; }
#msg-input:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── Mic button ──────────────────────────────────────────────────────── */
#mic-btn {
  background: #2a2d3a;
  color: #888;
  border: none;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  font-size: 18px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  position: relative;
}
#mic-btn:hover:not(:disabled) {
  background: #3a3d4a;
  color: #e8e8e8;
}
#mic-btn.recording {
  background: #ff4444;
  color: #fff;
  animation: mic-pulse 1s infinite;
}
@keyframes mic-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,68,68,0.5); }
  50%       { box-shadow: 0 0 0 8px rgba(255,68,68,0); }
}
#mic-btn:disabled { opacity: 0.35; cursor: not-allowed; }

#send-btn {
  background: #f5a623;
  color: #0f1117;
  border: none;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  font-size: 18px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
#send-btn:hover:not(:disabled) {
  background: #ffc94d;
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(245,166,35,0.45);
}
#send-btn:active:not(:disabled) { transform: translateY(0); }
#send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

/* ── Misc helpers ─────────────────────────────────────────────────────── */
b, strong { font-weight: 600; }
.text-muted { color: #666; font-size: 12px; }
.divider { border: none; border-top: 1px solid #2a2d3a; margin: 8px 0; }

/* ── Section pill labels ──────────────────────────────────────────────── */
.step-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: #f5a62318;
  color: #f5a623;
  border: 1px solid #f5a62330;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: block;
}

/* ── Scroll to bottom button ─────────────────────────────────────────── */
#scroll-btn {
  position: fixed;
  bottom: 80px;
  right: 24px;
  background: #1a1d27;
  border: 1px solid #3a3d4a;
  color: #888;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
  z-index: 20;
}
#scroll-btn:hover { background: #2a2d3a; color: #e8e8e8; }
#scroll-btn.visible { display: flex; }
</style>
</head>
<body>

<!-- Top Bar -->
<div id="topbar">
  <div class="logo">
    <span class="logo-icon">🟢</span>
    Green <span class="logo-name">Light</span>
    <span class="logo-badge">Agente</span>
  </div>
  <div id="user-fields">
    <input type="text" id="user-name" placeholder="Tu nombre" autocomplete="name" />
    <input type="email" id="user-email" placeholder="Tu email" autocomplete="email" />
  </div>
</div>

<!-- Progress bar -->
<div id="progress-bar"><div id="progress-fill"></div></div>

<!-- Chat Area -->
<div id="chat-area">
  <div class="chat-wrapper" id="chat-wrapper"></div>
</div>

<!-- Scroll to bottom -->
<button id="scroll-btn" title="Ir al final">↓</button>

<!-- Input Area -->
<div id="input-area">
  <div class="input-wrap">
    <textarea id="msg-input" rows="1" placeholder="Escribí tu respuesta..."></textarea>
    <button id="mic-btn" title="Hablar" style="display:none;">🎤</button>
    <button id="send-btn" title="Enviar (Enter)">➤</button>
  </div>
</div>

<script>
/* ── Config ──────────────────────────────────────────────────────────── */
const API = '';  // relative URLs → backend serves at /api/*

/* ── DOM refs ─────────────────────────────────────────────────────────── */
const chatWrapper = document.getElementById('chat-wrapper');
const chatArea    = document.getElementById('chat-area');
const input       = document.getElementById('msg-input');
const sendBtn     = document.getElementById('send-btn');
const micBtn      = document.getElementById('mic-btn');
const progFill    = document.getElementById('progress-fill');
const scrollBtn   = document.getElementById('scroll-btn');

/* ── State ────────────────────────────────────────────────────────────── */
let step           = -1;   // -1 = waiting for title
let answers        = {};
let diagnosis      = null;
let waitingForText = false;
let flowActive     = false;
let typingTimeout  = null;

/* ── Area keyword map ────────────────────────────────────────────────── */
const AREA_KEYWORDS = {
  'Checkout':     ['checkout', 'pago', 'compra', 'carrito', 'conversión', 'conversion', 'payment'],
  'Pagos':        ['pago', 'cobro', 'factura', 'billing', 'stripe', 'medio de pago', 'tarjeta'],
  'Onboarding':   ['onboarding', 'registro', 'alta', 'usuario nuevo', 'sign up', 'kyc'],
  'Backoffice':   ['backoffice', 'operaciones', 'admin', 'interno', 'gestión', 'gestion', 'back office'],
  'Facturación':  ['factura', 'afip', 'impuesto', 'contable', 'facturación electrónica', 'facturacion'],
  'Seguridad':    ['seguridad', 'fraude', 'autenticación', 'autenticacion', '2fa', 'infosec', 'vulnerabilidad'],
  'Otro':         []  // fallback
};

const ALL_AREAS = Object.keys(AREA_KEYWORDS);

function detectAreas(text) {
  const lower = text.toLowerCase();
  const detected = [];
  for (const [area, kws] of Object.entries(AREA_KEYWORDS)) {
    if (area === 'Otro') continue;
    if (kws.some(kw => lower.includes(kw))) {
      detected.push(area);
    }
  }
  if (detected.length === 0) detected.push('Otro');
  return detected;
}

const TOTAL_STEPS = STEPS.length + 1; // +1 for title

/* ── Utilities ────────────────────────────────────────────────────────── */
function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function riskLabel(level) {
  return { low:'Bajo', medium:'Medio', high:'Alto', critical:'Crítico' }[level] || level;
}

function scrollToBottom(force) {
  const atBottom = chatArea.scrollHeight - chatArea.scrollTop - chatArea.clientHeight < 80;
  if (force || atBottom) {
    chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });
  }
}

function setProgress(pct) {
  progFill.style.width = Math.min(100, Math.max(0, pct)) + '%';
}

/* ── Message rendering ────────────────────────────────────────────────── */
function addMsg(role, html) {
  const wrapper = document.createElement('div');
  wrapper.className = `msg ${role}`;

  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = role === 'agent' ? '⚡' : '👤';

  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = html;

  wrapper.appendChild(av);
  wrapper.appendChild(bub);
  chatWrapper.appendChild(wrapper);
  scrollToBottom(true);
  return bub;
}

/* ── Typing indicator ────────────────────────────────────────────────── */
function showTyping() {
  removeTyping();
  const wrapper = document.createElement('div');
  wrapper.className = 'msg agent';
  wrapper.id = 'typing-indicator';

  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = '⚡';

  const t = document.createElement('div');
  t.className = 'typing';
  t.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

  wrapper.appendChild(av);
  wrapper.appendChild(t);
  chatWrapper.appendChild(wrapper);

}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

/* ── Input state ──────────────────────────────────────────────────────── */
function setInputEnabled(enabled) {
  input.disabled = !enabled;
  sendBtn.disabled = !enabled;
  if (micBtn.style.display !== 'none') micBtn.disabled = !enabled;
  if (enabled) {
    input.focus();
    input.placeholder = 'Escribí tu respuesta...';
  }
}

/* ── Multi-select chips step ─────────────────────────────────────────── */
function askMultiSelect(s) {
  const description = answers.description || answers.title || '';
  const preselected = detectAreas(description);

  const preLabel = preselected.join(', ');
  const introText = preselected.length > 0 && !(preselected.length === 1 && preselected[0] === 'Otro')
    ? `Basándome en tu descripción, detecté que podría impactar: <b>${esc(preLabel)}</b>. ¿Es correcto? Podés seleccionar o deseleccionar las áreas que apliquen — podés elegir más de una.`
    : '¿A qué área de producto impacta? Podés elegir más de una.';

  const bub = addMsg('agent', `<div>${introText}</div>`);

  const selectedAreas = new Set(preselected);

  const chipsWrap = document.createElement('div');
  chipsWrap.className = 'chips-wrap';

  const chipEls = {};
  s.opts.forEach(opt => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (selectedAreas.has(opt) ? ' active' : '');
    chip.textContent = opt;
    chip.onclick = () => {
      if (chip.classList.contains('disabled')) return;
      if (selectedAreas.has(opt)) {
        selectedAreas.delete(opt);
        chip.classList.remove('active');
      } else {
        selectedAreas.add(opt);
        chip.classList.add('active');
      }
      confirmBtn.disabled = selectedAreas.size === 0;
      hintEl.textContent = selectedAreas.size > 0
        ? `${selectedAreas.size} área(s) seleccionada(s)`
        : 'Seleccioná al menos una área';
    };
    chipEls[opt] = chip;
    chipsWrap.appendChild(chip);
  });

  const confirmArea = document.createElement('div');
  confirmArea.className = 'confirm-area';

  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'chip-confirm-btn';
  confirmBtn.textContent = '✓ Confirmar selección';
  confirmBtn.disabled = selectedAreas.size === 0;

  const hintEl = document.createElement('span');
  hintEl.className = 'chip-hint';
  hintEl.textContent = selectedAreas.size > 0
    ? `${selectedAreas.size} área(s) seleccionada(s)`
    : 'Seleccioná al menos una área';

  confirmBtn.onclick = () => {
    Object.values(chipEls).forEach(c => c.classList.add('disabled'));
    confirmBtn.disabled = true;

    const selected = [...selectedAreas];
    answers[s.key] = selected;

    const displayVal = selected.join(', ');
    addMsg('user', esc(displayVal));
    step++;
    askStep(step);
  };

  confirmArea.appendChild(confirmBtn);
  confirmArea.appendChild(hintEl);

  bub.appendChild(chipsWrap);
  bub.appendChild(confirmArea);
  scrollToBottom(true);
}

/* ── Flow steps ───────────────────────────────────────────────────────── */
function askStep(i) {
  const stepsDone = i + 1;
  setProgress((stepsDone / TOTAL_STEPS) * 90);

  if (i >= STEPS.length) {
    runDiagnosis();
    return;
  }

  const s = STEPS[i];
  const delay = 550;

  showTyping();

  setTimeout(() => {
    removeTyping();

    if (s.type === 'multiselect') {
      askMultiSelect(s);
    } else if (s.type === 'buttons') {
      const bub = addMsg('agent', `<div>${s.q}</div>`);
      const btns = document.createElement('div');
      btns.className = 'buttons';

      s.opts.forEach(opt => {
        const b = document.createElement('button');
        b.className = 'btn-choice';
        b.textContent = opt;
        b.onclick = () => {
          btns.querySelectorAll('button').forEach(x => {
            x.disabled = true;
            if (x === b) x.classList.add('selected');
          });

          let val = opt;
          if (s.map)  val = (s.map[opt] !== undefined) ? s.map[opt] : opt;
          if (s.bool) val = !(s.bool_no_vals || ['No']).includes(opt);

          answers[s.key] = val;
          addMsg('user', esc(opt));
          step++;
          askStep(step);
        };
        btns.appendChild(b);
      });

      bub.appendChild(btns);
    } else {
      addMsg('agent', s.q);
      waitingForText = true;
      setInputEnabled(true);
    }
  }, delay);
}

/* ── Handle text input ────────────────────────────────────────────────── */
function handleUserInput(text) {
  text = text.trim();
  if (!text) return;

  if (text.toLowerCase() === 'ayuda' || text.toLowerCase() === 'help') {
    showHelp();
    return;
  }
  if (text.toLowerCase() === 'ver mis iniciativas') {
    fetchMyInitiatives();
    return;
  }

  if (!flowActive && text.toLowerCase() === 'enviar' && diagnosis) {
    addMsg('user', 'enviar');
    submitInitiative();
    return;
  }

  if (!flowActive && (text.toLowerCase().includes('nueva iniciativa') || text.toLowerCase() === 'nueva')) {
    addMsg('user', esc(text));
    startFlow();
    return;
  }

  if (waitingForText) {
    waitingForText = false;
    setInputEnabled(false);

    if (step === -1) {
      addMsg('user', esc(text));
      answers.title = text;
      step = 0;
      askStep(0);
    } else {
      const s = STEPS[step];
      if (s) {
        addMsg('user', esc(text));
        answers[s.key] = text;
        step++;
        askStep(step);
      }
    }
  }
}

/* ── Diagnosis ────────────────────────────────────────────────────────── */
async function runDiagnosis() {
  removeTyping();
  setInputEnabled(false);
  setProgress(92);

  const procBub = addMsg('agent', `
    <div class="processing-wrap">
      <div class="processing-msg">
        Analizando tu iniciativa contra la matriz de autoridad de Prosus y proyectos existentes
        <span class="processing-dots">
          <span class="pd"></span><span class="pd"></span><span class="pd"></span>
        </span>
      </div>
      <div class="progress-steps" id="proc-steps"></div>
    </div>
  `);

  const procSteps = [
    { icon: '🔍', text: 'Evaluando factores de riesgo...' },
    { icon: '📋', text: 'Consultando matriz de autoridad Prosus...' },
    { icon: '🔗', text: 'Buscando conflictos y sinergias...' },
    { icon: '⚙️', text: 'Generando diagnóstico...' }
  ];
  const stepsEl = document.getElementById('proc-steps');

  const minWait = new Promise(res => setTimeout(res, 2200));

  let stepIdx = 0;
  const addProcStep = () => {
    if (!stepsEl || stepIdx >= procSteps.length) return;
    const s = procSteps[stepIdx];
    const el = document.createElement('div');
    el.className = 'progress-step active';
    el.style.animationDelay = (stepIdx * 0.1) + 's';
    el.innerHTML = `<span class="step-icon">${s.icon}</span><span>${s.text}</span>`;
    stepsEl.appendChild(el);
    stepIdx++;
    scrollToBottom(true);
    if (stepIdx < procSteps.length) {
      setTimeout(addProcStep, 480);
    }
  };
  addProcStep();

  answers.owner_name  = document.getElementById('user-name').value.trim()  || 'Usuario';
  answers.owner_email = document.getElementById('user-email').value.trim() || '';

  let diagResult = null;
  try {
    const r = await fetch(`${API}/api/diagnose`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(answers)
    });
    if (r.ok) diagResult = await r.json();
  } catch(e) { /* fallback below */ }

  await minWait;

  if (!diagResult) {
    diagResult = buildMockDiagnosis(answers);
  }

  diagnosis = diagResult;

  procBub.closest('.msg').remove();
  setProgress(98);
  showDiagnosis(diagnosis);
}

/* ── Mock diagnosis (offline mode) ──────────────────────────────────── */
function buildMockDiagnosis(ans) {
  const fi = ans.financial_impact || 'minimal';
  const riskFactors = [
    !!ans.has_partners,
    !!ans.affects_checkout,
    !!ans.has_security_risk,
    ['high','critical'].includes(fi)
  ].filter(Boolean).length;
  const riskLevel = ['low','medium','high','critical'][Math.min(riskFactors, 3)];

  const required_teams = ['Product'];
  const reasons = { 'Product': 'Toda iniciativa requiere validación del equipo de Producto.' };
  const authority_flags = [];
  const recommendations = [];

  if (ans.has_partners) {
    required_teams.push('Legal','Tax');
    reasons['Legal'] = 'La iniciativa involucra partners o terceros externos. Se requiere revisión de contratos.';
    reasons['Tax']   = 'La participación de partners tiene implicancias impositivas.';
    authority_flags.push({
      flag: 'GENERAL_COUNSEL_REQUIRED',
      description: 'Iniciativas con partners requieren revisión del General Counsel.',
      authority_level: 'General Counsel'
    });
    recommendations.push('Asegurate de tener contratos firmados antes de avanzar.');
  }
  if (ans.affects_checkout || ['medium','high','critical'].includes(fi)) {
    if (!required_teams.includes('Billing')) {
      required_teams.push('Billing','Accounting');
      reasons['Billing']    = 'Impacto en checkout o flujo financiero detectado.';
      reasons['Accounting'] = 'Se requiere definir tratamiento contable del impacto.';
    }
    if (ans.affects_checkout) recommendations.push('Coordinar con QA para testing regresivo del checkout.');
  }
  if (ans.has_security_risk) {
    required_teams.push('Security');
    reasons['Security'] = 'Riesgos de seguridad informática identificados.';
  }
  if (['high','critical'].includes(fi) || ans.new_business_line) {
    if (!required_teams.includes('Internal Control')) {
      required_teams.push('Internal Control');
      reasons['Internal Control'] = 'Impacto alto o nueva línea de negocio requiere Control Interno.';
    }
  }
  if (ans.new_business_line) {
    authority_flags.push({
      flag: 'GROUP_BOARD_REQUIRED',
      description: 'Nueva línea de negocio requiere aprobación del Group Board.',
      authority_level: 'Group Board'
    });
    recommendations.push('Preparar business case para presentar al Group Board.');
  }
  if (fi === 'critical') {
    authority_flags.push({
      flag: 'GROUP_CFO_NOTIFICATION',
      description: 'Impacto financiero crítico (>$1M). Notificar al Group CFO.',
      authority_level: 'Group CFO'
    });
  }
  if (!recommendations.length) {
    recommendations.push('Seguir el proceso estándar de validación y mantener actualizado el estado en Green Light.');
  }

  return {
    required_teams,
    reasons,
    authority_flags,
    risk_level: riskLevel,
    conflicts: [],
    synergies: [],
    recommendations,
    mock: true
  };
}

/* ── Diagnosis card (Step 5) ─────────────────────────────────────────── */
function showDiagnosis(d) {
  const risk = d.risk_level || 'low';

  const teamsHtml = (d.required_teams || []).map(t => `
    <div class="team-item">
      <span class="team-badge">${esc(t)}</span>
      <span class="team-reason">${esc(d.reasons?.[t] || '')}</span>
    </div>
  `).join('') || '<div class="empty-state">Sin equipos requeridos.</div>';

  const flagsHtml = (d.authority_flags || []).length
    ? d.authority_flags.map(f => `
        <div class="flag-item">
          <div class="flag-label">⚠ ${esc(f.flag || '')}</div>
          <div class="flag-desc">${esc(f.description || '')}</div>
          <div class="flag-authority">Nivel de autoridad: ${esc(f.authority_level || '')}</div>
        </div>
      `).join('')
    : '<div class="empty-state">Sin flags de autoridad para esta iniciativa.</div>';

  let confHtml = '';
  (d.conflicts  || []).forEach(c => {
    confHtml += `<div class="conflict-item">⚡ <b>${esc(c.title)}</b> <span class="text-muted">${esc(c.status)}</span></div>`;
  });
  (d.synergies  || []).forEach(s => {
    confHtml += `<div class="synergy-item">🔗 <b>${esc(s.title)}</b> — ${esc(s.shared_area || '')}</div>`;
  });
  if (!confHtml) confHtml = '<div class="empty-state">No se detectaron conflictos ni sinergias.</div>';

  const recsHtml = (d.recommendations || []).map(r =>
    `<div class="rec-item"><span class="rec-arrow">→</span><span>${esc(r)}</span></div>`
  ).join('') || '<div class="empty-state">Sin recomendaciones adicionales.</div>';

  const mockNote = d.mock ? '<div style="font-size:11px;color:#555;margin-top:12px;padding-top:10px;border-top:1px solid #2a2d3a">⚠ Diagnóstico generado en modo offline (backend no disponible)</div>' : '';

  const cardHtml = `
    <div class="diagnosis-card">
      <div class="card-header">
        <h3>${esc(answers.title || 'Nueva Iniciativa')}</h3>
        <span class="risk-badge risk-${risk}">${riskLabel(risk)}</span>
      </div>
      <div class="card-section">
        <h4>🏢 Equipos que deben validar</h4>
        ${teamsHtml}
      </div>
      <div class="card-section">
        <h4>🚩 Flags de autoridad (Prosus)</h4>
        ${flagsHtml}
      </div>
      <div class="card-section">
        <h4>⚡ Conflictos y sinergias detectadas</h4>
        ${confHtml}
      </div>
      <div class="card-section">
        <h4>💡 Recomendaciones</h4>
        ${recsHtml}
        ${mockNote}
      </div>
    </div>
  `;

  const bub = addMsg('agent', cardHtml + '<br>¿Querés que envíe la solicitud de validación a estos equipos ahora?');

  const btns = document.createElement('div');
  btns.className = 'buttons';

  const btnYes = document.createElement('button');
  btnYes.className = 'btn-choice btn-primary';
  btnYes.textContent = '✅ Sí, enviar';

  const btnNo = document.createElement('button');
  btnNo.className = 'btn-choice btn-secondary';
  btnNo.textContent = '👀 Revisar primero';

  btnYes.onclick = () => {
    btns.querySelectorAll('button').forEach(x => x.disabled = true);
    btnYes.classList.add('selected');
    addMsg('user', 'Sí, enviar');
    submitInitiative();
  };

  btnNo.onclick = () => {
    btns.querySelectorAll('button').forEach(x => x.disabled = true);
    btnNo.classList.add('selected');
    addMsg('user', 'Revisar primero');
    flowActive = false;
    addMsg('agent',
      'De acuerdo. Podés tomarte el tiempo que necesites 🙌<br><br>' +
      'Cuando estés listo escribí <b>"enviar"</b> para registrar la iniciativa, ' +
      'o <b>"nueva iniciativa"</b> para empezar desde cero.'
    );
    waitingForText = true;
    setInputEnabled(true);
  };

  btns.appendChild(btnYes);
  btns.appendChild(btnNo);
  bub.appendChild(btns);
  scrollToBottom(true);
}

/* ── Submit initiative (Step 6) ──────────────────────────────────────── */
async function submitInitiative() {
  showTyping();
  setInputEnabled(false);
  flowActive = false;

  try {
    const payload = {
      ...answers,
      diagnosis_json: JSON.stringify(diagnosis),
      risk_level:     diagnosis?.risk_level || 'low'
    };

    const r = await fetch(`${API}/api/initiatives`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload)
    });

    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const created = await r.json();

    if (created.id && (diagnosis?.required_teams?.length || 0) > 0) {
      await fetch(`${API}/api/initiatives/${created.id}/validations`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          team_names:      diagnosis.required_teams,
          validator_name:  '',
          validator_email: ''
        })
      });
    }

    removeTyping();
    setProgress(100);

    const successHtml = `
      <div class="success-banner">
        <span class="success-icon">✅</span>
        <div class="success-title">¡Iniciativa registrada exitosamente!</div>
        <div class="success-qcid">${esc(created.qc_id || 'GL-????')}</div>
        <div class="success-detail">
          Los equipos de validación han sido notificados.<br>
          Hacé seguimiento desde el <b>Dashboard de Green Light</b>.
        </div>
      </div>
    `;
    addMsg('agent', successHtml);

    setTimeout(() => {
      const bub2 = addMsg('agent', '¿Querés registrar otra iniciativa?');
      const btns2 = document.createElement('div');
      btns2.className = 'buttons';
      const btnNew = document.createElement('button');
      btnNew.className = 'btn-choice';
      btnNew.textContent = '➕ Nueva iniciativa';
      btnNew.onclick = () => {
        btns2.querySelectorAll('button').forEach(x => x.disabled = true);
        btnNew.classList.add('selected');
        addMsg('user', '➕ Nueva iniciativa');
        startFlow();
      };
      btns2.appendChild(btnNew);
      bub2.appendChild(btns2);
      scrollToBottom(true);
      setInputEnabled(true);
      waitingForText = false;
    }, 900);

  } catch(e) {
    removeTyping();
    addMsg('agent',
      '⚠️ Hubo un error al conectar con el servidor.<br>' +
      'Verificá tu conexión e intentá de nuevo escribiendo <b>"enviar"</b>.'
    );
    flowActive = false;
    waitingForText = true;
    setInputEnabled(true);
  }
}

/* ── Start / restart flow ────────────────────────────────────────────── */
function startFlow() {
  flowActive     = true;
  step           = -1;
  answers        = {};
  diagnosis      = null;
  waitingForText = false;
  setInputEnabled(false);
  setProgress(5);

  showTyping();
  setTimeout(() => {
    removeTyping();
    addMsg('agent',
      'Hola! Soy <b>Green Light</b> 👋<br>' +
      'El centro de control de iniciativas de la empresa.<br><br>' +
      'Voy a ayudarte a validar tu proyecto, identificar riesgos y conectarte con los equipos correctos.<br><br>' +
      '¿Cómo se llama tu iniciativa?'
    );
    waitingForText = true;
    setInputEnabled(true);
  }, 600);
}

/* ── Fetch my initiatives ─────────────────────────────────────────────── */
async function fetchMyInitiatives() {
  const name = document.getElementById('user-name').value.trim();
  if (!name) {
    addMsg('agent', 'Por favor completá tu nombre en los campos de arriba para buscar tus iniciativas 👆');
    return;
  }
  showTyping();
  try {
    const r    = await fetch(`${API}/api/initiatives?search=${encodeURIComponent(name)}`);
    const data = await r.json();
    removeTyping();
    if (!Array.isArray(data) || data.length === 0) {
      addMsg('agent', `No encontré iniciativas registradas para <b>${esc(name)}</b>.`);
      return;
    }
    let html = `<b>Iniciativas de ${esc(name)} (${data.length}):</b><br><br>`;
    data.slice(0,8).forEach(d => {
      const risk = d.risk_level || 'low';
      html += `
        <div style="margin-bottom:12px;padding:10px;background:#0f1117;border-radius:8px;border:1px solid #2a2d3a">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span class="risk-badge risk-${risk}">${riskLabel(risk)}</span>
            <b>${esc(d.qc_id || '')}</b> — ${esc(d.title || '')}
          </div>
          <div class="text-muted">${esc(d.status || '')} · ${(d.created_at || '').slice(0,10)}</div>
        </div>`;
    });
    addMsg('agent', html);
  } catch(e) {
    removeTyping();
    addMsg('agent', 'No pude conectar con el servidor. Verificá que el backend esté disponible.');
  }
}

/* ── Help ─────────────────────────────────────────────────────────────── */
function showHelp() {
  addMsg('agent',
    '¡Hola! Puedo ayudarte a:<br><br>' +
    '• <b>Registrar y validar</b> nuevas iniciativas de negocio<br>' +
    '• <b>Identificar riesgos</b> y equipos que deben aprobar<br>' +
    '• <b>Detectar conflictos</b> o sinergias con proyectos existentes<br>' +
    '• <b>Ver el estado</b> de tus iniciativas activas<br><br>' +
    '<b>Comandos disponibles:</b><br>' +
    '→ <b>nueva iniciativa</b> — iniciar el cuestionario<br>' +
    '→ <b>ver mis iniciativas</b> — listar tus proyectos<br>' +
    '→ <b>enviar</b> — confirmar y registrar (después de revisar)<br>' +
    '→ <b>ayuda</b> — mostrar este mensaje'
  );
}

/* ── Event Listeners ──────────────────────────────────────────────────── */
sendBtn.onclick = () => {
  const t = input.value.trim();
  if (!t) return;
  input.value = '';
  autoResize();
  handleUserInput(t);
};

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendBtn.click();
  }
});

input.addEventListener('input', autoResize);

function autoResize() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
}

chatArea.addEventListener('scroll', () => {
  const distFromBottom = chatArea.scrollHeight - chatArea.scrollTop - chatArea.clientHeight;
  scrollBtn.classList.toggle('visible', distFromBottom > 120);
});

scrollBtn.onclick = () => scrollToBottom(true);

/* ── Voice / Speech Recognition ─────────────────────────────────────── */
(function initSpeech() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    return;
  }

  micBtn.style.display = 'flex';

  let recognition = null;
  let isRecording = false;

  function startRecording() {
    if (isRecording) {
      stopRecording();
      return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = 'es-AR';
    recognition.continuous = true;
    recognition.interimResults = true;

    let finalTranscript = input.value;

    recognition.onstart = () => {
      isRecording = true;
      micBtn.classList.add('recording');
      micBtn.title = 'Hablando... click para detener';
      micBtn.textContent = '🔴';
    };

    recognition.onresult = (event) => {
      let interimTranscript = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
          finalTranscript += transcript;
        } else {
          interimTranscript += transcript;
        }
      }
      input.value = finalTranscript + interimTranscript;
      autoResize();
    };

    recognition.onerror = (event) => {
      console.warn('Speech recognition error:', event.error);
      stopRecording();
    };

    recognition.onend = () => {
      stopRecording();
    };

    try {
      recognition.start();
    } catch(e) {
      console.warn('Could not start recognition:', e);
      stopRecording();
    }
  }

  function stopRecording() {
    isRecording = false;
    micBtn.classList.remove('recording');
    micBtn.title = 'Hablar';
    micBtn.textContent = '🎤';
    if (recognition) {
      try { recognition.stop(); } catch(e) {}
      recognition = null;
    }
    input.focus();
  }

  micBtn.addEventListener('click', () => {
    if (micBtn.disabled) return;
    startRecording();
  });
})();

/* ── Boot ─────────────────────────────────────────────────────────────── */
setInputEnabled(false);

setTimeout(() => {
  startFlow();
}, 400);
</script>
